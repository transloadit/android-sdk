name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - unlabeled

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      TRANSLOADIT_KEY: ${{ secrets.TRANSLOADIT_KEY }}
      TRANSLOADIT_SECRET: ${{ secrets.TRANSLOADIT_SECRET }}

    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 19
        uses: actions/setup-java@v4
        with:
          java-version: '19'
          distribution: 'adopt'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew assemble
      - name: Run Tests
        run: ./gradlew check

      - name: Run Docker E2E tests
        if: env.TRANSLOADIT_KEY != '' && env.TRANSLOADIT_SECRET != ''
        env:
          TRANSLOADIT_KEY: ${{ env.TRANSLOADIT_KEY }}
          TRANSLOADIT_SECRET: ${{ env.TRANSLOADIT_SECRET }}
          ANDROID_SDK_USE_LOCAL_JAVA_SDK: '0'
        run: |
          printf 'TRANSLOADIT_KEY=%s\nTRANSLOADIT_SECRET=%s\n' "$TRANSLOADIT_KEY" "$TRANSLOADIT_SECRET" > .env
          ./scripts/test-in-docker.sh clean check
          rm -f .env

  slack-on-failure:
    needs: [android]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: 8398a7/action-slack@v3
        with:
          status: failure
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
